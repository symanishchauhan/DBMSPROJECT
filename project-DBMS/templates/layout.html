<!DOCTYPE html>
<html>
<head>

<title>Smart Lost & Found</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">


<div class="flex h-screen">

<!-- SIDEBAR -->

<div class="w-64 bg-gray-900 text-white flex flex-col">

<div class="p-6 text-xl font-bold border-b border-gray-700">

Smart Lost & Found

</div>


<nav class="flex-1 p-4 space-y-3">

<a href="/user?email={{email}}" class="block p-3 rounded hover:bg-gray-700">
Dashboard
</a>

<a href="/search?email={{email}}" class="block p-3 rounded hover:bg-gray-700">
Search Item
</a>

<a href="/report?email={{email}}" class="block p-3 rounded hover:bg-gray-700">
Report Item
</a>

<a href="/claim?email={{email}}" class="block p-3 rounded hover:bg-gray-700">
Claim Item
</a>

<a href="/my_reports?email={{email}}" class="block p-3 rounded hover:bg-gray-700">
My Reported Items
</a>

<a href="/my_claims?email={{email}}" class="block p-3 rounded hover:bg-gray-700">
My Claims
</a>

<a href="/activity_summary?email={{email}}" class="block p-3 rounded hover:bg-gray-700">
Activity Summary
</a>

</nav>


<div class="p-4 border-t border-gray-700">

<a href="/" class="block p-3 bg-red-500 text-center rounded hover:bg-red-600">
Logout
</a>

</div>

</div>


<!-- MAIN CONTENT -->

<div class="flex-1 p-10 overflow-y-auto">


<div class="flex justify-between items-center mb-6">

<h1 class="text-2xl font-bold">
Welcome {{ email.split('@')[0] }}
</h1>


<!-- Notification Bell -->

<div class="relative">

<button onclick="toggleNotifications()"
class="bg-black text-white px-3 py-2 rounded">

🔔

</button>

<div id="notificationPanel"
class="hidden absolute right-0 mt-2 w-72 bg-white shadow-lg rounded-lg p-4">

<h3 class="font-bold mb-2">Notifications</h3>

<div id="notificationList">
Loading...
</div>

</div>

</div>

</div>


{% block content %}
{% endblock %}


</div>

</div>


<script>

function toggleNotifications(){

const panel = document.getElementById("notificationPanel")

panel.classList.toggle("hidden")

}


async function loadNotifications(){

const res = await fetch("/api/notifications")

const data = await res.json()

const container = document.getElementById("notificationList")

container.innerHTML = ""

data.notifications.forEach(n => {

container.innerHTML += `
<div class="border-b py-2 text-sm">
${n.message}
</div>
`

})

}

loadNotifications()

setInterval(loadNotifications,4000)

</script>

</body>
</html>
