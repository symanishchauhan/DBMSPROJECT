{% extends "layout.html" %}

{% block content %}

<div class="flex flex-col items-center mt-10">

<h2 class="text-3xl font-bold text-white mb-10">
System Analytics
</h2>


<!-- GLASS STAT CARDS -->

<div class="grid grid-cols-3 gap-8 mb-12">

<div class="backdrop-blur-lg bg-white/30 border border-white/20 p-8 rounded-xl shadow-xl text-center w-60">

<h3 class="text-lg font-semibold text-white">
Total Items
</h3>

<p id="totalCount" class="text-4xl font-bold mt-3 text-white">
0
</p>

</div>


<div class="backdrop-blur-lg bg-white/30 border border-white/20 p-8 rounded-xl shadow-xl text-center w-60">

<h3 class="text-lg font-semibold text-white">
Items Claimed
</h3>

<p id="claimedCount" class="text-4xl font-bold mt-3 text-white">
0
</p>

</div>


<div class="backdrop-blur-lg bg-white/30 border border-white/20 p-8 rounded-xl shadow-xl text-center w-60">

<h3 class="text-lg font-semibold text-white">
Pending Items
</h3>

<p id="pendingCount" class="text-4xl font-bold mt-3 text-white">
0
</p>

</div>

</div>



<!-- CHART SECTION -->

<div class="backdrop-blur-lg bg-white/30 border border-white/20 p-10 rounded-xl shadow-xl w-[650px]">

<canvas id="statsChart"></canvas>

</div>

</div>



<!-- CHART JS -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<script>

const total = {{ total_items }}
const claimed = {{ claimed_items }}
const pending = {{ pending_items }}


// ---------------- COUNTER ANIMATION ----------------

function animateValue(id, start, end, duration){

let range = end - start
let current = start
let increment = end > start ? 1 : -1
let stepTime = Math.abs(Math.floor(duration / range))

let obj = document.getElementById(id)

let timer = setInterval(function(){

current += increment

obj.innerText = current

if(current == end){

clearInterval(timer)

}

}, stepTime)

}


animateValue("totalCount",0,total,800)
animateValue("claimedCount",0,claimed,800)
animateValue("pendingCount",0,pending,800)


// ---------------- CHART ----------------

const ctx = document.getElementById('statsChart')

new Chart(ctx, {

type: 'doughnut',

data: {

labels: ['Total Items','Claimed','Pending'],

datasets: [{

data: [total,claimed,pending],

backgroundColor: [

'#3b82f6',
'#22c55e',
'#ef4444'

]

}]

}

})

</script>

{% endblock %}
